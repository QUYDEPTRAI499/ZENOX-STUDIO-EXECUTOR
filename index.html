<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tien Executor Web</title>
    <meta
      name="description"
      content="High-speed executor directory with a premium dark galaxy look."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="stars stars--small"></div>
    <div class="stars stars--large"></div>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Tien Executor Web</p>
          <h1>Ultra-fast downloads, premium quality, no ads.</h1>
          <p class="hero-text">
            Made in Vietnam. Premium speed, free access, no ads, and a clean dark galaxy interface built for smooth browsing.
          </p>
          <div class="hero-cta">
            <a class="hero-button hero-button--primary" href="https://discord.gg/M8K9M4w8Ac" target="_blank" rel="noreferrer">Support Server</a>
            <a class="hero-button hero-button--ghost" href="/executor" target="_blank" rel="noreferrer">Raw API</a>
          </div>
        </div>

        <div class="hero-panel">
          <div class="hero-stats" id="hero-stats">
            <div class="hero-stat">
              <span>Total</span>
              <strong id="total-available">-</strong>
            </div>
            <div class="hero-stat">
              <span>Online</span>
              <strong id="total-online">-</strong>
            </div>
            <div class="hero-stat">
              <span>Premium</span>
              <strong id="total-premium">-</strong>
            </div>
          </div>
          <div class="hero-api-links">
            <a href="/executor" target="_blank" rel="noreferrer">/executor</a>
            <a href="/ver" target="_blank" rel="noreferrer">/ver</a>
            <a href="https://discord.gg/M8K9M4w8Ac" target="_blank" rel="noreferrer">Discord</a>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="platform-tabs" id="platform-tabs"></div>
        <label class="search-box">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Search executor name..." />
        </label>
      </section>

      <section class="platform-summary" id="platform-summary"></section>

      <section class="cards-grid" id="cards-grid" aria-live="polite"></section>
    </div>

    <template id="card-template">
      <article class="executor-card">
        <div class="card-glow"></div>
        <div class="card-top">
          <div class="card-avatar"></div>
          <div class="card-title-wrap">
            <h2 class="card-title"></h2>
            <div class="card-badges"></div>
          </div>
        </div>

        <dl class="card-fields"></dl>

        <div class="card-actions"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
